faiss_db:
  collection_name: "document_portal"

embedding_model:
  provider: "google"
  model_name: "text-embedding-005"

  provider: "openai"
  model_name: "text-embedding-3-large"
  
retriever:
  top_k: 10

llm:
  groq:
    provider: "groq"
    model_name: "deepseek-r1-distill-llama-70b"
    temperature: 0
    max_output_tokens: 2048

  google:
    provider: "google"
    model_name: "gemini-2.5-flash"
    temperature: 0
    max_output_tokens: 2048

  openai:
    provider: "openai"
    model_name: "gpt-4o"        # general large model
    temperature: 0.0
    max_output_tokens: 2048
